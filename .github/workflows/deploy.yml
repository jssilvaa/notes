name: Deploy Quartz Notes

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22

      - run: npm install

      - name: Clone vault
        run: |
          git clone https://x-access-token:${{ secrets.VAULT_TOKEN }}@github.com/jssilvaa/research-vault.git vault
          rm -rf content
          ln -s $(pwd)/vault content

      - name: Build
        run: npx quartz build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public