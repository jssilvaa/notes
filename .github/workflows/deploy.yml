name: Deploy Quartz Notes

on:
  push:
    branches: [main]
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Clone vault
        run: |
          git clone https://x-access-token:${{ secrets.VAULT_TOKEN }}@github.com/jssilvaa/research-vault.git vault
          rm -rf content
          ln -s $(pwd)/vault content

      - name: Build
        run: npx quartz build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
